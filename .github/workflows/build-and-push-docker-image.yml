name: Build and push docker image to github registry.

on:
  workflow_run:
    workflows: [Release]
    types:
      - completed

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Resolve latest release tag
        id: release-tag
        shell: bash
        run: |
          git fetch --force --tags origin
          latestTag="$(git tag --sort=-v:refname | head -n 1)"

          if [[ -z "$latestTag" ]]; then
            echo "No Git tags found after release workflow completed." >&2
            exit 1
          fi

          normalizedTag="${latestTag#v}"

          if [[ ! "$normalizedTag" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest release tag '$latestTag' is not a supported semver value." >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          {
            echo "tag=$latestTag"
            echo "version=$major.$minor.$patch"
            echo "majorMinor=$major.$minor"
            echo "major=$major"
          } >> "$GITHUB_OUTPUT"

      - name: Build from source
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Repository variable to lowercase
        id: string
        uses: ASzc/change-string-case-action@v1
        with:
          string: ${{ github.repository }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ghcr.io/${{ steps.string.outputs.lowercase }}
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.release-tag.outputs.version }}
            type=raw,value=${{ steps.release-tag.outputs.majorMinor }}
            type=raw,value=${{ steps.release-tag.outputs.major }}
            type=sha
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: .docker/Dockerfile
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}