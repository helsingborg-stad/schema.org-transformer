services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schema-transformer
    env_file:
      - path: .env
        required: false
  typesense:
    image: typesense/typesense:0.24.0
    container_name: typesense
    restart: on-failure
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: '--data-dir /data --api-key=xyz --enable-cors'

volumes:
  typesense-data:
